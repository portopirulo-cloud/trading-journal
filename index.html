<!doctype html><html lang='es'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Trading Journal v2</title><link rel='stylesheet' href='style.css'></head><body><div class='container'><h1>Trading Journal v2</h1><div class='grid'><div class='card'><h3>Win Rate</h3><p id='wr'>0%</p></div><div class='card'><h3>Operaciones</h3><p id='ops'>0</p></div><div class='card'><h3>Balance</h3><input id='balance' type='number' value='5000'></div></div><div class='card'><h2>Nueva Operación</h2><form id='tradeForm'><input id='date' type='date'><input id='asset' placeholder='Activo'><select id='direction'><option>Compra</option><option>Venta</option></select><select id='result'><option>TP</option><option>SL</option><option>BE</option></select><input id='rr' type='number' step='0.1' placeholder='RR'><textarea id='notes' placeholder='Notas'></textarea><button>Guardar</button></form></div><div class='card'><table><thead><tr><th>Fecha</th><th>Activo</th><th>Resultado</th><th>RR</th><th>Notas</th></tr></thead><tbody id='tbody'></tbody></table></div></div><script src='script.js'></script></body></html>
